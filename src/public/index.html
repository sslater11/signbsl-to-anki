<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignBSL to Anki</title>
</head>


<style>
    .center-all {
        display: flex;
        justify-content: center;
        font-family:Arial, Helvetica, sans-serif;
        font-size: 1rem;
        text-align: center;
    }

    .counters_container {
        display: flex;               /* Use flexbox for alignment */
        flex-direction: column;      /* Stack items vertically */
        align-items: center;         /* Center items horizontally */
        justify-content: center;     /* Center items vertically (if needed) */
        font-family:Arial, Helvetica, sans-serif;
        font-size: 1rem;
        text-align: center;
    }

    .counters_item {
        margin: 0.2rem 0;           /* Space between items */
        text-align: center;         /* Center text inside the item */
        font-family:Arial, Helvetica, sans-serif;
        font-size: 1rem;
    }

    table {
        border-spacing: 0;
        border-collapse: collapse;
        margin-top: 1rem;
    }

    td {
        padding:1rem;
        font-family:Arial, Helvetica, sans-serif;
        font-size: 2rem;
        text-align: center;
        padding-left:  1rem;
        padding-right: 1rem;

        border-style: solid;
        border-width: 10;
        border-color: black;
    }
    input[type="text"] {
        width: 10rem;
    }
    input[type="checkbox"] {
        zoom: 3;
    }
    .table-header {
        font-weight: bold;
    }

    .create-anki-deck-button {
        font-family:Arial, Helvetica, sans-serif;
        font-size: 2rem;
        margin-bottom: 1rem;
    }

    .search-text {
        font-family:Arial, Helvetica, sans-serif;
        font-size: 2rem;
        text-align: center;
    }

    .download-buttons {
        font-family:Arial, Helvetica, sans-serif;
        font-size: 1rem;
        text-align: center;
    }
</style>

<body>
    <div class="center-all">
        <h1>SignBSL to Anki Flashcard Creator</h1>
    </div>
    <div class="counters_container">                                                                                     
        <b><p id="word_counter" class="counters_item"></p></b>                                                  
        <b><p id="flashcard_counter" class="counters_item"></p></b>                               
    </div>
    <div class="center-all">
        <button type="button" id="download_last_generated_deck_button" class="download-buttons" >Download the<br>most recently generated deck</button>
    </div>
    <div class="center-all">
        <p id="message_to_user"></p>
    </div>
    <div class="center-all">
        <form id="search_form" method="POST">
            <input class="search-text" type="text" id="text_input" name="text_input" required>
            <button class="search-text" type="submit" id="search_form_button">Find Signs</button>
        </form>
    </div>
    <br>
    <div class="center-all">
        <div id="div_create_anki_deck">
            <form id="create_flashcards_form" method="POST">
                <button type="submit" id="create_anki_deck_button" class="create-anki-deck-button" >Create Anki Deck</button>
            </form>
        </div>
    </div>
    <div class="center-all">
        <div id="div_download_buttons">
            <button type="button" id="download_deck_button" class="download-buttons" >Download this<br>small deck</button>
            &nbsp; &nbsp;
            <button type="button" id="download_complete_deck_button" class="download-buttons" >Download the<br>complete deck</button>
        </div>
    </div>
    <div class="center-all">
        <h2 id="table-heading">Select one video for each different sign.</h2>
    </div>
    <div class="center-all">
        <div id="div_table_for_videos">
            <!-- table tag goes here :)-->
        </div>
    </div>

    <script>
        /* TODO: test what happens when signbsl is down and we can't get any data from it.
                hopefully this script will just do nothing.
                make it return a 'signbsl server connection error' 
        */
        const get_last_generated_deck = async (event) => {
            try {
                const input_data = {
                    user_selected_videos: [1,2,3]
                };
                const response = await fetch( get_url_subpath() + '/submit_get_last_generated_deck', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(input_data),
                });

                const result = await response.json();
                console.log( result );
                const last_generated_deck_button = document.getElementById("download_last_generated_deck_button");
                if( result === null | result === undefined ) {
                    last_generated_deck_button.disabled = true;
                    last_generated_deck_button.textContent = "No decks to download.";
                } else {
                    download_file( result );
                }
            } catch (error) {
                console.error('Error:', error);
                show_error_message( error );
            }
        };
        const get_word_count = async (event) => {
            try {
                const input_data = {
                    nonsense_data_to_pass: [1,2,3]
                };
                const response = await fetch( get_url_subpath() + '/submit_get_word_count', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(input_data),
                });

                const result = await response.json();
                const word_counter       = document.getElementById("word_counter");
                const flashcard_counter  = document.getElementById("flashcard_counter");
                if( result === null | result === undefined ) {
                    word_counter.textContent      = "Unknown Word Count :(";
                    flashcard_counter.textContent = "Unknown Flashcard Count :(";
                } else {
                    word_counter.textContent      = "Total word count: "      + result[0];
                    flashcard_counter.textContent = "Total flashcard count: " + result[1];
                }
            } catch (error) {
                console.error('Error:', error);
                show_error_message( error );
            }
        };

        const VIDEO_INDEX_PREFIX     = "video_row_";
        const CHECKBOX_INDEX_PREFIX  = "video_checkbox_";

        const COLOR_PASTEL_GREEN      = "#7CFFAF";
        const COLOR_PASTEL_LIGHT_BLUE = "#71CFE8";
        const COLOR_PASTEL_BLUE       = "#8989FF";
        const COLOR_PASTEL_PURPLE     = "#DA9BE8";
        const COLOR_PASTEL_SALMON     = "#FFBFBC";

        const ALL_COLORS = [
            COLOR_PASTEL_GREEN,
            COLOR_PASTEL_LIGHT_BLUE,
            COLOR_PASTEL_BLUE,
            COLOR_PASTEL_PURPLE,
            COLOR_PASTEL_SALMON
        ]; 

        //const COLOR_NOT_HIGHLIGHTED_RABLE_ROW = "#ebebeb";
        const COLOR_NOT_HIGHLIGHTED_RABLE_ROW = "#f0f0f0";
        const COLOR_HIGHLIGHTED_TABLE_ROW = COLOR_PASTEL_LIGHT_BLUE;

        var id = ""; // Used to make each search request unique.
        var all_words_and_videos;

        show_default_message();
        document.getElementById( "download_deck_button" ).disabled = true;
        document.getElementById( "download_complete_deck_button" ).disabled = true;
        document.getElementById( "create_anki_deck_button" ).disabled = true;
        document.getElementById( "div_create_anki_deck" ).style.opacity = 0;
        document.getElementById( "div_download_buttons" ).style.opacity = 0;
        document.getElementById( "table-heading" ).style.opacity = 0;

        document.getElementById( "create_anki_deck_button" ).setAttribute("formaction", get_url_subpath() + "/submit_users_selected_videos");
        document.getElementById( "search_form_button"      ).setAttribute("formaction", get_url_subpath() + "/submit");

        // Put cursor focus on the text box when the page loads.
        window.onload = function() {
            document.getElementById("text_input").focus();
            get_word_count();
        };

        const last_generated_deck_button = document.getElementById("download_last_generated_deck_button");
        last_generated_deck_button.setAttribute("onclick", "get_last_generated_deck ()");


        class AllWordsAndVideos {
            INDEX_WORD  = 0;
            INDEX_VIDEO = 1;
            DEFAULT_CHECKBOX_VALUE = true;

            /*
             * Receives an array that looks like this:
             *    [  id, [  [word, [video1, video2] ], [word2,[vids]]  ]  ]
             */
            constructor( all_words_and_videos ) {
                this.id = all_words_and_videos[0];
                this.words_and_videos = all_words_and_videos[1];
                this.checkboxes = [];

                // Create checkboxes for each video for each word.
                for( let i = 0; i < this.words_and_videos.length; i++ ) {
                    let checkboxes_for_this_word = [];
                    const number_of_videos = this.words_and_videos[i][this.INDEX_VIDEO].length;
                    for( let k = 0; k < this.getSizeOfVideoArrayForWord(i); k++ ) {
                        checkboxes_for_this_word = checkboxes_for_this_word.concat( this.DEFAULT_CHECKBOX_VALUE );
                    }

                    this.checkboxes = this.checkboxes.concat( [ checkboxes_for_this_word ] );
                }
            }

            getWord( word_index ) {
                return this.words_and_videos[ word_index ][ this.INDEX_WORD ];
            }

            getVideo( word_index, video_index ) {
                return this.words_and_videos[ word_index ][ this.INDEX_VIDEO ][ video_index ];
            }

            getVideoURL( word_index, video_index ) {
                return  get_url_subpath() + "/cache/" + this.getVideo( word_index, video_index );
            }

            getAllWordsAndVideos() {
                return this.words_and_videos;
            }

            getSizeOfVideoArrayForWord( word_index ) {
                return this.words_and_videos[ word_index ][ this.INDEX_VIDEO ].length;
            }

            getSizeOfWordsArray( word_index ) {
                return this.words_and_videos.length;
            }

            /*
             * Will return [  id, [  [word, [video1, video2], [true, false] ], [word2,[vids],[booleans]]  ]  ]
             * Mimicking the way we received the data, but adding the boolean values for the chosen videos.
             */
            getAllSelectedWordsVideosAndID() {
                var user_selection = this.words_and_videos;

                // Add all the checkboxes to the list of all words and videos.
                for( let i = 0; i < this.words_and_videos.length; i++ ) {
                    user_selection[i] = user_selection[i].concat( [ this.checkboxes[i] ] );
                }

                return [ this.id, user_selection ];
            }

            getCheckboxElementID( word_index, video_index ) {
                return CHECKBOX_INDEX_PREFIX + "_" + word_index + "_" + video_index;
            }

            getVideoElementID( word_index, video_index ) {
                return VIDEO_INDEX_PREFIX    + "_" + word_index + "_" + video_index;
            }

            getCheckboxValue( word_index, video_index ) {
                return this.checkboxes[ word_index ][ video_index ];
            }

            setCheckboxValue( word_index, video_index, is_ticked ) {
                this.checkboxes[ word_index ][ video_index ] = is_ticked;
            }

            getWordHighlightBackgroundColor( word_index ) {
                const color_index = word_index % ALL_COLORS.length;
                return ALL_COLORS[ color_index ];
            }

            updateSingleRowHighlight( word_index, video_index ) {
                var row = document.getElementById( this.getVideoElementID( word_index, video_index ) );
                if( this.checkboxes[word_index][video_index] ) {
                    // Highlight
                    row.setAttribute( "bgColor", this.getWordHighlightBackgroundColor( word_index ) );
                } else {
                    // Do not highlight.
                    row.setAttribute( "bgColor", COLOR_NOT_HIGHLIGHTED_RABLE_ROW );
                }
            }

            updateAllRowHighlights() {
                for( let i = 0; i < this.words_and_videos; i++ ) {
                    for( let k = 0; k < this.words_and_videos[i]; k++ ) {
                        updateSingleRowHighlight( i, k );
                    }
                }
            }
        }


        // Code from Harvey Kadyanji @ https://stackoverflow.com/questions/36903527/how-do-you-automatically-download-a-file-in-javascript
        const download_file = (file) => {
            const element = document.createElement('a');
            subpath = get_url_subpath().slice(1); // Remove '/' from the beginning.
            element.setAttribute('href', subpath + "/" + file); // path to file on server.
            element.setAttribute('download', file.slice(6)); // slice the /decks/ off the start of the string. // This is for the filename of the download.

            element.style.display = 'none';

            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        function get_url_subpath() {
            // Get the current URL
            const url = window.location.href;
            
            // Get the subpath.
            const urlObj = new URL(url);
            const subpath = urlObj.pathname;

            if( subpath == "/" ) {
                return "";
            } else {
                return subpath;
            }
        }

        function show_error_message( error_message ) {
            let message_to_user = document.getElementById("message_to_user");
            message_to_user.textContent = "ERROR: " + error_message;
            message_to_user.style.color = "rgb( 255, 0, 0 )";
            message_to_user.style.fontSize = "3rem";
        }

        function show_default_message( error_message ) {
            let message_to_user = document.getElementById("message_to_user");
            message_to_user.textContent = "Type a word you would like to make a flashcard for";
            message_to_user.style.color = "rgb( 0, 0, 0 )";
            message_to_user.style.fontSize = "1rem";
        }

        function click_checkbox( word_index, video_index ) {
            const new_checkbox_value = ! all_words_and_videos.getCheckboxValue( word_index, video_index );
            all_words_and_videos.setCheckboxValue( word_index, video_index, new_checkbox_value );
            all_words_and_videos.updateSingleRowHighlight( word_index, video_index );
        }

        function remove_all_tables() {
            // Remove any old tables from previous runs.
            var table_div = document.getElementById('div_table_for_videos');
            if (typeof table_div !== 'undefined') {
                while( table_div.firstChild ) {
                    table_div.removeChild( table_div.firstChild );
                }
            }
        }



        function generate_videos_table() {
            document.getElementById( "div_create_anki_deck" ).style.opacity = 1;
            document.getElementById( "table-heading" ).style.opacity = 1;

            // Remove any old tables from previous runs.
            remove_all_tables();
            var table_div = document.getElementById('div_table_for_videos');

            for( let i = 0; i < all_words_and_videos.getSizeOfWordsArray(); i++ ) {
                // Create a new table.
                var table = document.createElement('TABLE');
                var table_body = document.createElement('TBODY');
                table.appendChild(table_body);

                // Add all videos to the table.
                const number_of_videos = all_words_and_videos.getSizeOfVideoArrayForWord( i );
                for (let k = 0; k < number_of_videos; k++) {
                    var tr = document.createElement('TR');
                    table_body.appendChild(tr);

                    var td_1 = document.createElement('TD');

                    // Add video cell to table.
                    // Video HTML: var video_html = '" id="myvid_' + k + '" src="' + all_words_and_videos.getVideo( i, k ) + '"loop="true" autoplay="autoplay" controlslist="nodownload" controls=""';
                    var video_element = document.createElement('video');
                    video_element.muted = true;
                    video_element.setAttribute( "id",           all_words_and_videos.getVideoElementID( i, k ) );
                    video_element.setAttribute( "src",          all_words_and_videos.getVideoURL( i, k ) );
                    video_element.setAttribute( "loop",         "true" );
                    video_element.setAttribute( "autoplay",     "true" );
                    video_element.setAttribute( "width",        "100%" );
                    video_element.setAttribute( "height",       "100%" );
                    //video_element.setAttribute( "controlslist", "nodownload" );
                    //video_element.setAttribute( "controls",     "" );
                    td_1.appendChild( video_element );
                    td_1.appendChild( document.createElement("br") );
                    td_1.appendChild( document.createTextNode( all_words_and_videos.getWord( i ) ) );


                    // Add checkbox cell to table.
                    //var checkbox_element = document.createElement("input");
                    //checkbox_element.setAttribute( "type", "checkbox" );
                    //checkbox_element.setAttribute( "id", all_words_and_videos.getCheckboxElementID( i, k ) );
                    //checkbox_element.setAttribute( "checked", "true" );
                    //td_1.appendChild( document.createElement("br") );
                    //td_1.appendChild( checkbox_element );

                    tr.appendChild(td_1);

                    tr.setAttribute( "id", all_words_and_videos.getVideoElementID( i, k ) );
                    tr.setAttribute( "onclick", "click_checkbox(" + i + ", " + k + " )" );
                }

                // Add table to our div tag.
                table_div.appendChild( table );

                // This will set all checkboxes to ticked and hightlight the videos :).
                for (let k = 0; k < number_of_videos; k++) {
                    // Can only be ran after the table has been created.
                    all_words_and_videos.setCheckboxValue( i, k, true );
                    all_words_and_videos.updateSingleRowHighlight( i, k, true );
                }
            }
            
            document.getElementById( "table-heading" ).style.opacity = 1;
            document.getElementById("search_form_button").disabled = false;
            document.getElementById("search_form_button").textContent = "Find Signs";
            document.getElementById("create_anki_deck_button").disabled = false;
            document.getElementById("text_input").disabled = false;
        }

        const search_form = document.getElementById("search_form");
        search_form.addEventListener("submit", async (event) => {
            event.preventDefault(); // Prevent default form submission
            show_default_message();

            document.getElementById("search_form_button").textContent = "Loading...";
            document.getElementById("create_anki_deck_button").disabled = true;
            document.getElementById("search_form_button").disabled = true;
            document.getElementById("text_input").disabled = true;
            document.getElementById("download_deck_button").disabled = true;
            document.getElementById("download_complete_deck_button").disabled = true;

            document.getElementById("div_create_anki_deck").style.opacity = 0;
            document.getElementById("div_download_buttons").style.opacity = 0;
            document.getElementById("table-heading").style.opacity = 0;

            remove_all_tables();
            var table_div = document.getElementById('div_table_for_videos');

            const input_data = {
                text_input: document.getElementById('text_input').value
            };

            try {
                const response = await fetch( get_url_subpath() + '/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify( input_data )
                });

                const data_from_server = await response.json();
                if( data_from_server[0].toLowerCase() == "error" ) {
                    show_error_message( data_from_server[1] );
                } else {
                    all_words_and_videos = new AllWordsAndVideos( data_from_server );
                    generate_videos_table();
                }
            } catch (error) {
                console.error('Error:', error);
                show_error_message( error );
            }

        });


        const create_flashcards_form = document.getElementById("create_flashcards_form");
        create_flashcards_form.addEventListener("submit", async (event) => {
            event.preventDefault(); // Prevent default form submission
            
            var download_deck_button          = document.getElementById("download_deck_button");
            var download_complete_deck_button = document.getElementById("download_complete_deck_button");

            download_deck_button.disabled = true;
            download_complete_deck_button.disabled = true;

            // Generate a list of videos with checkbox values
            var selected_videos = all_words_and_videos.getAllSelectedWordsVideosAndID();

            // Send the list to the server.
            try {
                const input_data = {
                    user_selected_videos: selected_videos
                };
                const response = await fetch( get_url_subpath() + '/submit_users_selected_videos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify( input_data )
                });

                const data_from_server = await response.json();
                if( data_from_server[0].toLowerCase() == "error" ) {
                    show_error_message( data_from_server[1] );
                    download_deck_button.setAttribute(          "onclick", "show_error_message( \"No deck to download.\" )" );
                    download_complete_deck_button.setAttribute( "onclick", "show_error_message( \"No newly generated deck to download.\" )" );
                } else {
                    download_deck_button.setAttribute(          "onclick", "download_file( \"" + data_from_server[0] + "\" )" );
                    download_complete_deck_button.setAttribute( "onclick", "download_file( \"" + data_from_server[1] + "\" )" );
                }
            } catch (error) {
                console.error('Error:', error);
                show_error_message( error );
                download_deck_button.setAttribute(          "onclick", "show_error_message( \"No deck to download.\" )" );
                download_complete_deck_button.setAttribute( "onclick", "show_error_message( \"No newly generated deck to download.\" )" );
            }

            document.getElementById( "div_download_buttons" ).style.opacity = 1;
            download_deck_button.disabled = false;
            download_complete_deck_button.disabled = false;
            get_word_count();
        });
    </script>
</body>
</html>
